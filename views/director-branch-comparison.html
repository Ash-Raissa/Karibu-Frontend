<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KGL Director Branch Performance</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="/css/dashboard.css" rel="stylesheet">
</head>

<body>
  <!-- Sidebar navigation for director pages -->
  <div class="sidebar">
    <div class="sidebar-header">
      <img src="/imgs/logo.png" alt="KGL Logo" class="logo">
      <h4>Director</h4>
    </div>
    <hr>
    <a href="/director-dashboard.html"><i class="fa-solid fa-chart-line me-2"></i>Dashboard</a>
    <a href="/director-register-users.html"><i class="fa-solid fa-user-plus me-2"></i>Register Users</a>
    <a href="/director-branch-comparison.html"><i class="fa-solid fa-code-compare me-2"></i>Branch Performance</a>
    <a href="/director-produce-performance.html"><i class="fa-solid fa-seedling me-2"></i>Produce Performance</a>
    <a href="/index.html" id="logoutLink"><i class="fa-solid fa-right-from-bracket me-2"></i>Logout</a>
  </div>

  <!-- Main branch comparison area -->
  <div class="content">
    <div class="mb-4">
      <h3 id="directorBranchTitle">Branch Performance</h3>
    </div>

    <!-- Feedback messages -->
    <div id="directorAlert" class="alert d-none" role="alert"></div>

    <!-- Table that compares branches -->
    <div class="card shadow-sm">
      <div class="card-header bg-light">
        <h5 class="mb-0">Branch Performance</h5>
      </div>
      <div class="card-body table-responsive">
        <table class="table table-bordered table-striped mb-0">
          <thead>
            <tr>
              <th>Branch</th>
              <th>Total Sales</th>
              <th>Total Credit</th>
              <th>Stock Remaining (kg)</th>
            </tr>
          </thead>
          <tbody id="branchPerformanceBody"></tbody>
        </table>
      </div>
    </div>
  </div>


  <script>
    // Auth setup and reusable helpers.

    // Base URL for the backend API server
    const API_BASE_URL = 'http://localhost:3000';

    // get the authentication token stored after Login
    const token = localStorage.getItem('token');
    // Check a condition before running the next block.
    if (!token) window.location.href = '/login.html';   //if not token exists, redirect user to login page

    // Function to attach authorization headers to API requests
    // it adds the JWT token to the request so the server knows the user is auth
    function authHeaders(extra = {}) {
      // Return a value from this function.
      return { ...extra, Authorization: `Bearer ${token}` };
    // Close the current code block.
    }

    // This finction displays alert messages on the page
    // 
    function showAlert(type, message, timeoutMs = 3500) {
      // Declare a constant value used in this script.
      const alert = document.getElementById('directorAlert');

      // Apply bootstrap alert style
      alert.className = `alert alert-${type}`;

      //set alert text  
      alert.textContent = message;
      // Make alert visible 

      // Hide alert automatically after timeout
      alert.classList.remove('d-none');
      // Check a condition before running the next block.
      if (timeoutMs > 0) setTimeout(() => alert.classList.add('d-none'), timeoutMs);
    // Close the current code block.
    }

    // Function to handle logout functionality
    function setupLogout() {

      // Find logout button/link
      const logoutLink = document.getElementById('logoutLink');
      // Check a condition before running the next block.
      if (!logoutLink) return;
      // Attach an event listener to react to user interaction.
      logoutLink.addEventListener('click', async (e) => {

        // prevent normal link behaviour
        e.preventDefault();
        // Start error-handled execution for the following operations.
        try {
          // Notify backend server that user is logging out
          await fetch(`${API_BASE_URL}/logout`, { method: 'POST', headers: authHeaders() });
        // Handle errors thrown by the previous try block.
        } catch (_) {

          // ignore errors if server fails
        }

        // Remove aunthentication data from browser storage
        localStorage.removeItem('token');
        // Remove stored session data from local storage.
        localStorage.removeItem('userProfile');

        // Redirect user back to login page
        window.location.href = '/login.html';
      // Execute this step as part of the page logic.
      });
    // Close the current code block.
    }

    // Helper function for making protected API calls
    // Automatically attaches authentication headers
    async function fetchProtected(url) {
      // Declare a constant value used in this script.
      const res = await fetch(url, { headers: authHeaders() });

      // If server says user is unauthorized or forbidden
      if (res.status === 401 || res.status === 403) {

        // Clear stored login data
        localStorage.removeItem('token');
        // Remove stored session data from local storage.
        localStorage.removeItem('userProfile');

        // Redirect user to login page
        window.location.href = '/login.html';
        // Return a value from this function.
        return null;
      // Close the current code block.
      }
      // Return a value from this function.
      return res;
    // Close the current code block.
    }
    // Function to ensure only DIRECTOR role can access this page
    async function guardDirectorAccess() {

      // Request user profile from server
      const res = await fetchProtected(`${API_BASE_URL}/auth/profile`);
      // Check a condition before running the next block.
      if (!res) return false;

      // Convert response to JSON
      const user = await res.json();

      // If user is NOT a director
      if ((user.role || '').toLowerCase() !== 'director') {

        // Redirect them to manager dashboard
        window.location.href = '/manager.html';
        // Return a value from this function.
        return false;
      // Close the current code block.
      }

      //Access allowed
      return true;
    // Close the current code block.
    }

    // Function to load branch performance data
    // This is the data the director sees in the dashboard
    async function loadBranchPerformance() {

      // Request branch comparison data from API
      const res = await fetchProtected(`${API_BASE_URL}/director/branch-comparison`);
      // Check a condition before running the next block.
      if (!res) return;

      // Declare a constant value used in this script.
      const result = await res.json();

      // If API returned an error
      if (!res.ok) {
        // Execute this step as part of the page logic.
        showAlert('danger', result.message || 'Failed to load branch performance.');
        // Return a value from this function.
        return;
      // Close the current code block.
      }

      // Get table body element where data will be inserted
      const table = document.getElementById('branchPerformanceBody');

      // Clear previous table content
      table.innerHTML = '';

      // Loop through branch data and create table rows
      (result.data || []).forEach((row) => {
        // Execute this step as part of the page logic.
        table.innerHTML += `
          <tr>
            <td>${row.branch || '-'}</td>
            <td>UGX ${row.totalSales || 0}</td>
            <td>UGX ${row.totalCredit || 0}</td>
            <td>${row.stockRemaining || 0}</td>
          </tr>
        `;
      // Execute this step as part of the page logic.
      });

      // If no data exists show message
      if (!table.innerHTML)
        // Render dynamic HTML content into the target element.
        table.innerHTML = '<tr><td colspan="4">No branch data available.</td></tr>';

    // Close the current code block.
    }

    // Main startup function that runs when the page loads
    (async () => {

      // Activate logout functionality
      setupLogout();

      // Ensure the logged-in user is a director
      const ok = await guardDirectorAccess();

      // Stop execution if user is not authorized
      if (!ok) return;

      // Load branch performance data into the dashboard
      await loadBranchPerformance();
    // Immediately invoke this startup function.
    })();
  </script>
</body>

</html>
